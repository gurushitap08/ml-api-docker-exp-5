apiVersion: apps/v1
kind: Deployment

metadata:
  name: ml-api-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: ml-api

  template:
    metadata:
      labels:
        app: ml-api

    spec:
      containers:
      - name: ml-api
        image: gurushitap08/ml-api
        ports:
        - containerPort: 8000